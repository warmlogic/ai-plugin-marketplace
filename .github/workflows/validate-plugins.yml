name: Validate plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate marketplace
        run: npx -y @anthropic-ai/claude-code plugin validate .

      - name: Validate each plugin
        run: |
          for dir in plugins/*/; do
            if [ -f "$dir/.claude-plugin/plugin.json" ]; then
              echo "--- Validating $dir ---"
              npx -y @anthropic-ai/claude-code plugin validate "$dir"
            fi
          done
